
<style>
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
  @keyframes pulse-glow { 0%,100%{box-shadow:0 0 20px 4px rgba(160,130,255,0.3)} 50%{box-shadow:0 0 40px 12px rgba(160,130,255,0.6)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes reveal { 0%{opacity:0;transform:scale(0.5)} 100%{opacity:1;transform:scale(1)} }
  @keyframes star-spin { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.3)} 100%{transform:rotate(360deg) scale(1)} }
  @keyframes cloud-drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }
  
  .orb-wrap { display:flex; flex-direction:column; align-items:center; padding:2rem 1rem; }
  .orb-container { position:relative; width:220px; height:220px; cursor:pointer; animation:float 3s ease-in-out infinite; }
  .orb-container.shaking { animation:shake 0.5s ease-in-out; }
  .orb-svg { width:220px; height:220px; }
  .sparkle { position:absolute; font-size:14px; animation:sparkle 2s ease-in-out infinite; pointer-events:none; }
  .answer-display { min-height:60px; display:flex; align-items:center; justify-content:center; margin:1.5rem 0; }
  .answer-text { font-size:20px; font-weight:500; color:var(--color-text-primary); text-align:center; animation:reveal 0.6s cubic-bezier(0.34,1.56,0.64,1); letter-spacing:0.5px; }
  .question-area { display:flex; gap:8px; width:100%; max-width:400px; margin-top:0.5rem; }
  .question-area input { flex:1; padding:10px 14px; border-radius:24px; border:1.5px solid #a28bf5; background:rgba(162,139,245,0.08); color:var(--color-text-primary); font-size:14px; outline:none; }
  .question-area input:focus { border-color:#c4a8ff; background:rgba(162,139,245,0.12); }
  .ask-btn { padding:10px 20px; border-radius:24px; border:none; background:linear-gradient(135deg,#a28bf5,#c4a8ff); color:#fff; font-size:14px; font-weight:500; cursor:pointer; transition:transform 0.15s,opacity 0.15s; white-space:nowrap; }
  .ask-btn:hover { transform:scale(1.04); opacity:0.92; }
  .ask-btn:active { transform:scale(0.97); }
  .hint { font-size:12px; color:var(--color-text-tertiary); margin-top:0.75rem; text-align:center; }
  .category-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
  .category-yes { background:#7fd47f; }
  .category-no { background:#e88; }
  .category-maybe { background:#f5c842; }
</style>

<div class="orb-wrap">
  <h2 class="sr-only">Magic crystal ball — type a yes/no question and receive a mystical answer</h2>

  <div style="margin-bottom:1.5rem;text-align:center;">
    <div style="font-size:13px;color:var(--color-text-secondary);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">Crystal Ball</div>
    <div style="font-size:11px;color:var(--color-text-tertiary);">ask a yes or no question</div>
  </div>

  <div style="position:relative;">
    <div class="orb-container" id="orb" onclick="shake()">
      <svg class="orb-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="orbGrad" cx="38%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#e8e0ff"/>
            <stop offset="40%" stop-color="#b8a0f8"/>
            <stop offset="100%" stop-color="#6a4fcf"/>
          </radialGradient>
          <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c0a8ff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#8060e0" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="shineGrad" cx="35%" cy="30%" r="45%">
            <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="orbClip"><circle cx="110" cy="100" r="80"/></clipPath>
        </defs>

        <circle cx="110" cy="100" r="90" fill="#8060e0" opacity="0.15"/>
        <circle cx="110" cy="100" r="80" fill="url(#orbGrad)" stroke="#c0a0ff" stroke-width="2"/>
        <circle cx="110" cy="100" r="80" fill="url(#shineGrad)"/>

        <g clip-path="url(#orbClip)" id="orbContent">
          <text id="star1" x="110" y="85" text-anchor="middle" font-size="28" fill="white" opacity="0.9" style="animation:star-spin 4s linear infinite;transform-origin:110px 85px">✦</text>
          <text x="78" y="110" font-size="10" fill="white" opacity="0.5" style="animation:sparkle 2.5s ease-in-out infinite 0.3s">✦</text>
          <text x="145" y="95" font-size="8" fill="white" opacity="0.4" style="animation:sparkle 2.5s ease-in-out infinite 1s">★</text>
          <text x="90" y="125" font-size="6" fill="white" opacity="0.5" style="animation:sparkle 2.5s ease-in-out infinite 0.7s">✦</text>
          <text x="130" y="118" font-size="7" fill="white" opacity="0.4" style="animation:sparkle 2.5s ease-in-out infinite 1.5s">★</text>
          <text x="100" y="68" font-size="5" fill="white" opacity="0.6" style="animation:sparkle 3s ease-in-out infinite 0.2s">✦</text>

          <ellipse cx="108" cy="125" rx="28" ry="8" fill="white" opacity="0.25" style="animation:cloud-drift 3s ease-in-out infinite"/>
          <ellipse cx="92" cy="122" rx="16" ry="6" fill="white" opacity="0.2" style="animation:cloud-drift 3.5s ease-in-out infinite 0.5s"/>
          <ellipse cx="124" cy="121" rx="14" ry="5" fill="white" opacity="0.2" style="animation:cloud-drift 4s ease-in-out infinite 1s"/>
        </g>

        <circle cx="110" cy="100" r="80" fill="url(#glowGrad)"/>
        <ellipse cx="88" cy="72" rx="24" ry="12" fill="white" opacity="0.2" transform="rotate(-30 88 72)"/>

        <ellipse cx="110" cy="183" rx="44" ry="9" fill="#4a3a80" opacity="0.35"/>
        <path d="M74 180 Q66 185 62 188 Q80 188 90 184Z" fill="#5a4a90"/>
        <path d="M146 180 Q154 185 158 188 Q140 188 130 184Z" fill="#5a4a90"/>
        <rect x="88" y="175" width="44" height="12" rx="4" fill="#5a4a90"/>
        <ellipse cx="110" cy="175" rx="36" ry="8" fill="#7060b0"/>

        <text x="110" y="158" text-anchor="middle" font-size="9" fill="#c0b0f0" letter-spacing="1" style="font-family:sans-serif">☽</text>
      </svg>
    </div>

    <div style="position:absolute;top:-10px;right:-10px;font-size:16px;animation:sparkle 1.8s ease-in-out infinite 0.3s">✦</div>
    <div style="position:absolute;top:30px;left:-15px;font-size:10px;animation:sparkle 2.2s ease-in-out infinite 1s">✦</div>
    <div style="position:absolute;bottom:40px;right:-18px;font-size:12px;animation:sparkle 2s ease-in-out infinite 0.6s">★</div>
    <div style="position:absolute;bottom:30px;left:-12px;font-size:8px;animation:sparkle 2.5s ease-in-out infinite 1.4s">✦</div>
  </div>

  <div class="answer-display">
    <div class="answer-text" id="answerText" style="display:none"></div>
    <div id="idleMsg" style="font-size:13px;color:var(--color-text-tertiary);text-align:center;line-height:1.6">
      Ask a question or<br>tap the orb to reveal your fate
    </div>
  </div>

  <div class="question-area">
    <input type="text" id="questionInput" placeholder="Will I get the job? Am I lucky today?" maxlength="120" onkeydown="if(event.key==='Enter')askQuestion()"/>
    <button class="ask-btn" onclick="askQuestion()">Ask ✦</button>
  </div>

  <div class="hint" id="hintArea"></div>

  <div style="display:flex;gap:16px;margin-top:1.5rem;font-size:11px;color:var(--color-text-tertiary);">
    <span><span class="category-dot category-yes"></span>yes</span>
    <span><span class="category-dot category-maybe"></span>maybe</span>
    <span><span class="category-dot category-no"></span>no</span>
    <span style="margin-left:4px">15 answers</span>
  </div>
</div>

<script>
const answers = [
  {text:"The stars say yes ✦", cat:"yes", color:"#a0e0a0"},
  {text:"Without a doubt ✦", cat:"yes", color:"#a0e0a0"},
  {text:"It is certain ✦", cat:"yes", color:"#a0e0a0"},
  {text:"The cosmos align for you ✦", cat:"yes", color:"#a0e0a0"},
  {text:"Signs point to yes ✦", cat:"yes", color:"#a0e0a0"},
  {text:"As I see it, yes ✦", cat:"yes", color:"#a0e0a0"},
  {text:"The spirits whisper... maybe", cat:"maybe", color:"#f5d060"},
  {text:"The mist clouds my vision", cat:"maybe", color:"#f5d060"},
  {text:"Ask again under the moon", cat:"maybe", color:"#f5d060"},
  {text:"The fates are undecided", cat:"maybe", color:"#f5d060"},
  {text:"The stars remain silent", cat:"maybe", color:"#f5d060"},
  {text:"The orb sees no ✦", cat:"no", color:"#f08888"},
  {text:"The cosmos say no", cat:"no", color:"#f08888"},
  {text:"My vision says no ✦", cat:"no", color:"#f08888"},
  {text:"Do not count on it ✦", cat:"no", color:"#f08888"},
];

let isAnimating = false;
const orbEl = document.getElementById('orb');
const ansEl = document.getElementById('answerText');
const idleEl = document.getElementById('idleMsg');
const hintEl = document.getElementById('hintArea');

function updateOrbColor(cat) {
  const gradStops = {
    yes: ['#c0f0c0','#78c878','#2a7a2a'],
    no: ['#f8c0c0','#e08080','#8a2a2a'],
    maybe: ['#fef0b0','#e8c840','#8a6800'],
    idle: ['#e8e0ff','#b8a0f8','#6a4fcf']
  };
  const stops = gradStops[cat] || gradStops.idle;
  const grad = document.getElementById('orbGrad');
  grad.children[0].setAttribute('stop-color', stops[0]);
  grad.children[1].setAttribute('stop-color', stops[1]);
  grad.children[2].setAttribute('stop-color', stops[2]);
}

function revealAnswer(q) {
  if (isAnimating) return;
  isAnimating = true;
  hintEl.textContent = q ? `"${q.length > 40 ? q.slice(0,37)+'...' : q}"` : '';

  orbEl.classList.add('shaking');
  setTimeout(() => orbEl.classList.remove('shaking'), 500);

  idleEl.style.display = 'none';
  ansEl.style.display = 'none';

  setTimeout(() => {
    const pick = answers[Math.floor(Math.random() * answers.length)];
    updateOrbColor(pick.cat);
    ansEl.style.color = pick.color;
    ansEl.textContent = pick.text;
    ansEl.style.display = 'block';
    isAnimating = false;
  }, 550);
}

function shake() {
  const q = document.getElementById('questionInput').value.trim();
  revealAnswer(q || null);
}

function askQuestion() {
  const q = document.getElementById('questionInput').value.trim();
  revealAnswer(q);
  document.getElementById('questionInput').value = '';
}
</script>
